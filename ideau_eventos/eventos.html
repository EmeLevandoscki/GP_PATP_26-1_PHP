<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eventos — Organizador IDEAU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body data-page="admin-events" class="admin-page">
  <aside class="admin-sidebar">
    <a class="brand admin-brand" href="dashboard.html"><span class="brand-mark">ID</span><span class="brand-text"><strong>IDEAU Eventos</strong><small>Organizador</small></span></a>
    <nav class="admin-nav">
      <a href="dashboard.html">Dashboard</a>
      <a class="active" href="eventos.html">Eventos</a>
      <a href="evento-form.html">Novo evento</a>
      <a href="inscritos.html">Inscritos</a>
      <a href="index.html" target="_blank">Ver site público</a>
    </nav>
    <button class="btn btn-danger full" id="logoutButton" type="button">Sair</button>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <div><p class="eyebrow">Gestão</p><h1>Eventos</h1></div>
      <div class="dashboard-actions"><a href="evento-form.html" class="btn btn-primary">Novo evento</a><button class="btn btn-secondary" id="resetDemoData" type="button">Restaurar demo</button></div>
    </header>

    <section class="panel-card">
      <div class="panel-heading"><h2>Eventos cadastrados</h2><p class="muted">Edite, publique, copie o link público ou exclua eventos.</p></div>
      <div class="table-wrap"><table class="data-table"><thead><tr><th>Evento</th><th>Data</th><th>Vagas</th><th>Inscritos</th><th>Status</th><th>Ações</th></tr></thead><tbody id="adminEventsTable"></tbody></table></div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="assets/js/app.js"></script>
</body>
</html>
