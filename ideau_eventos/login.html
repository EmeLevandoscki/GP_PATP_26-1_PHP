<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login do Organizador — IDEAU Eventos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body data-page="login" class="auth-page">
  <header class="site-header transparent-header">
    <a class="brand" href="../index.html"><span class="brand-mark">ID</span><span class="brand-text"><strong>IDEAU Eventos</strong><small>Organizador</small></span></a>
    <nav class="main-nav always-visible"><a href="../index.php">Página pública</a></nav>
  </header>

  <main class="auth-layout">
    <section class="auth-copy">
      <p class="eyebrow">Ambiente administrativo</p>
      <h1>PAINEL DO<br><span class="outline-word">ORGANIZADOR</span></h1>
      <p>Entre para criar eventos, definir campos de inscrição, publicar links individuais e acompanhar inscritos.</p>
    </section>
    <section class="auth-card">
      <p class="eyebrow">Acesso</p>
      <h2>Entrar</h2>
      <form id="loginForm" class="form-stack">
        <label class="form-field"><span>E-mail</span><input id="loginEmail" type="email" autocomplete="email" required placeholder="organizador@ideau.edu.br"></label>
        <label class="form-field"><span>Senha</span><input id="loginPassword" type="password" autocomplete="current-password" required placeholder="ideau2026"></label>
        <button class="btn btn-primary full" type="submit">Acessar painel</button>
      </form>
      <div class="demo-access">
        <strong>Acesso de demonstração</strong>
        <span>organizador@ideau.edu.br</span>
        <span>ideau2026</span>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="assets/js/app.js"></script>
</body>
</html>
